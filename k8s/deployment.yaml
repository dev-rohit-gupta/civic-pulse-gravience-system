apiVersion: v1
kind: ConfigMap
metadata:
  name: civic-pulse-config
  namespace: default
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_VERSION: "v1"
  API_PREFIX: "/api"
---
apiVersion: v1
kind: Secret
metadata:
  name: civic-pulse-secrets
  namespace: default
type: Opaque
stringData:
  JWT_SECRET: "your-jwt-secret-base64-encoded"
  MONGODB_URI: "your-mongodb-connection-string"
  AWS_ACCESS_KEY_ID: "your-aws-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret"
  GOOGLE_API_KEY: "your-google-api-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: civic-pulse-server
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: civic-pulse-server
  template:
    metadata:
      labels:
        app: civic-pulse-server
    spec:
      containers:
      - name: server
        image: your-registry/civic-pulse-server:latest
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: civic-pulse-config
        - secretRef:
            name: civic-pulse-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: civic-pulse-server
  namespace: default
spec:
  selector:
    app: civic-pulse-server
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: civic-pulse-client
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: civic-pulse-client
  template:
    metadata:
      labels:
        app: civic-pulse-client
    spec:
      containers:
      - name: client
        image: your-registry/civic-pulse-client:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: civic-pulse-client
  namespace: default
spec:
  selector:
    app: civic-pulse-client
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: civic-pulse-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - your-domain.com
    secretName: civic-pulse-tls
  rules:
  - host: your-domain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: civic-pulse-server
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: civic-pulse-client
            port:
              number: 80
